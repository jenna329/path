<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PathBank</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;--surface3:#222738;
  --border:#2a2f3d;--border2:#363c50;
  --text:#e8eaf0;--text2:#9aa0b4;--text3:#5a6075;
  --accent:#5b7fff;--accent2:#3d5ce8;--accent-glow:rgba(91,127,255,0.15);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.13);
  --red:#ff6b6b;--red-bg:rgba(255,107,107,0.1);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.1);
  --purple:#b47fff;--purple-bg:rgba(180,127,255,0.13);
  --radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --font:'Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0}
.sidebar-logo{padding:0 20px 28px;font-size:22px;font-weight:700;color:var(--text)}
.sidebar-logo span{color:var(--accent)}
.sidebar-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:0 20px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-glow)}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sidebar-stats{padding:16px 20px;margin-top:auto}
.stat-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.stat-val{color:var(--text);font-weight:600;font-family:var(--mono)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,107,107,0.3)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Cards & Forms */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.form-input,.form-textarea,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-textarea{resize:vertical;min-height:80px}

/* Header */
.page-header{padding:28px 36px 0;display:flex;align-items:flex-start;justify-content:space-between}
.page-title{font-size:28px;font-weight:700;color:var(--text)}
.page-sub{color:var(--text2);font-size:14px;margin-top:4px}

/* Badges */
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;font-family:var(--mono);display:inline-block}
.badge-cat{background:rgba(91,127,255,0.12);color:var(--accent)}
.badge-bookmark{background:var(--amber-bg);color:var(--amber)}
.badge-wrong{background:var(--red-bg);color:var(--red)}
.badge-correct{background:var(--blue-bg);color:var(--blue)}
.badge-rdemo{background:var(--purple-bg);color:var(--purple)}

/* Toast */
.toast-wrap{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:slideUp .25s ease}
.toast-success{background:var(--blue-bg);border:1px solid rgba(74,158,255,0.4);color:var(--blue)}
.toast-error{background:var(--red-bg);border:1px solid rgba(255,107,107,0.4);color:var(--red)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Upload */
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius);background:var(--surface2);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:10px;overflow:hidden}
.upload-area:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-area img{width:100%;height:auto;display:block}
.upload-icon{font-size:32px;opacity:.5}
.upload-text{color:var(--text2);font-size:13px}
.upload-hint{font-size:12px;color:var(--text3)}
kbd{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:11px}

/* Options */
.options-list{display:flex;flex-direction:column;gap:10px}
.option-row{display:flex;align-items:center;gap:10px}
.opt-num-badge{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;font-family:var(--mono)}
.opt-num-badge.correct{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.opt-radio{appearance:none;width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.opt-radio:checked{background:var(--blue);border-color:var(--blue)}

/* Tags */
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;min-height:42px;cursor:text}
.tag-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.tag{background:var(--surface3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2);display:inline-flex;align-items:center;gap:5px}
.tag-del{cursor:pointer;color:var(--text3);font-size:14px;line-height:1}
.tag-del:hover{color:var(--red)}
.tag-input-bare{background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font);min-width:80px;flex:1}

/* Filter chips */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;padding:16px 36px 0}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Category chips */
.cat-chip{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sec-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s}
.sec-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Register grid */
.register-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:28px 36px}
.register-col{display:flex;flex-direction:column;gap:20px}

/* Question list */
.q-list{padding:0 36px 36px;display:flex;flex-direction:column;gap:12px;margin-top:16px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:flex-start;gap:16px;transition:border-color .15s}
.q-card:hover{border-color:var(--border2)}
.q-thumb{width:64px;height:64px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:22px;border:1px solid var(--border);overflow:hidden}
.q-thumb img{width:100%;height:100%;object-fit:cover}
.q-info{flex:1;min-width:0}
.q-text{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-meta{display:flex;gap:6px;flex-wrap:wrap}
.q-actions{display:flex;gap:8px;flex-shrink:0}

/* Quiz */
.quiz-wrap{padding:28px 36px;max-width:780px;margin:0 auto;width:100%}
.progress-bar-wrap{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.progress-bar{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.progress-text{font-size:12px;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.quiz-img-wrap{border-radius:var(--radius);overflow:hidden;background:var(--surface2);border:1px solid var(--border);margin-bottom:24px}
.quiz-img-wrap img{width:100%;height:auto;display:block}
.quiz-question{font-size:20px;font-weight:700;line-height:1.55;color:var(--text);margin-bottom:24px}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.quiz-option{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-size:14px;color:var(--text2);font-family:var(--font);width:100%;text-align:left}
.quiz-option:hover:not([disabled]){border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.quiz-option.selected{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.quiz-option.correct{border-color:var(--blue);background:var(--blue-bg);color:var(--text)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-bg);color:var(--text)}
.quiz-opt-num{width:28px;height:28px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.result-card{padding:20px;border-radius:var(--radius);margin-top:16px}
.result-card.correct{background:var(--blue-bg);border:1px solid rgba(74,158,255,0.25)}
.result-card.wrong{background:var(--red-bg);border:1px solid rgba(255,107,107,0.25)}
.result-header{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;margin-bottom:10px}
.result-header.correct{color:var(--blue)}
.result-header.wrong{color:var(--red)}
.explanation p{margin:0 0 4px;font-size:14px;color:var(--text2);line-height:1.65}
.quiz-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

/* Mode select */
.mode-btn{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-family:var(--font);font-size:15px;color:var(--text2);width:100%}
.mode-btn:hover{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.mode-cnt{color:var(--text3);font-family:var(--mono);font-size:12px}

/* Done screen */
.done-wrap{text-align:center;padding:60px 0}
.done-icon{font-size:56px;margin-bottom:16px}
.done-score{font-family:var(--mono);font-size:32px;color:var(--accent);margin:20px 0}

/* Empty */
.empty{text-align:center;padding:64px 0;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:14px}

/* Setup */
.setup-wrap{padding:40px 36px;max-width:640px}
.setup-step{display:flex;gap:16px;margin-bottom:28px}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.step-body h3{font-size:15px;font-weight:600;margin-bottom:6px}
.step-body p{font-size:13px;color:var(--text2);line-height:1.6}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-family:var(--mono);font-size:12px;color:#a8d8a8;margin-top:10px;overflow-x:auto;white-space:pre}
a{color:var(--accent)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);color:var(--text2);font-size:14px}

/* Mobile */
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;cursor:pointer;font-size:18px;line-height:1;color:var(--text)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
@media(max-width:680px){
  .hamburger{display:flex}
  .sidebar{position:fixed;left:-240px;top:0;height:100%;z-index:160;transition:left .25s;width:220px}
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .main{width:100%}
  .page-header{padding:16px 16px 0}
  .filter-bar{padding:12px 16px 0}
  .q-list{padding:0 16px 24px}
  .quiz-wrap{padding:16px}
  .register-grid{grid-template-columns:1fr;padding:16px}
  .page-title{font-size:22px;margin-top:8px}
}
</style>
</head>
<body>
<div id="app"><div class="loading">불러오는 중…</div></div>
<div class="toast-wrap" id="toasts"></div>

<script>
'use strict';

// ── Supabase (fetch 기반 경량 클라이언트) ──
const SUPABASE_URL = 'https://reiynkkoiwatekttqahh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlaXlua2tvaXdhdGVrdHRxYWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODEzMzEsImV4cCI6MjA5ODU1NzMzMX0.IgV9YWF1XTsu7OLxgkiUVnIzTBvlP7aT-TSnX8G6QOU';

const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};
const REST = SUPABASE_URL + '/rest/v1';
const STORAGE = SUPABASE_URL + '/storage/v1';

async function sbSelect() {
  try {
    const r = await fetch(REST + '/questions?select=*&order=created_at.desc', {headers: SB_HEADERS});
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  } catch(e) { console.error(e); return []; }
}
async function sbInsert(q) {
  try {
    const r = await fetch(REST + '/questions', {method:'POST', headers:SB_HEADERS, body:JSON.stringify(q)});
    const d = await r.json();
    return d.code ? {error: d} : {data: d};
  } catch(e) { return {error: e}; }
}
async function sbUpdate(id, data) {
  try {
    await fetch(REST + '/questions?id=eq.'+id, {method:'PATCH', headers:SB_HEADERS, body:JSON.stringify(data)});
    return {error: null};
  } catch(e) { return {error: e}; }
}
async function sbDelete(id) {
  try {
    await fetch(REST + '/questions?id=eq.'+id, {method:'DELETE', headers:SB_HEADERS});
    return {error: null};
  } catch(e) { return {error: e}; }
}
async function sbUpload(file) {
  // 이미지를 압축한 뒤 base64로 변환해서 DB에 직접 저장
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.onload = () => {
        // 최대 1200px로 리사이즈, 품질 0.75로 압축
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const base64 = canvas.toDataURL('image/jpeg', 0.75);
        resolve({url: base64});
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── LocalStorage fallback ──
const LS = 'pathbank_questions';
function lsLoad() { try { return JSON.parse(localStorage.getItem(LS)||'[]'); } catch { return []; } }
function lsSave(d) { try { localStorage.setItem(LS, JSON.stringify(d)); } catch {} }

// ── State ──
let questions = [];
let page = 'quiz';

// ── Toast ──
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Render engine ──
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'disabled') { if (v) el.disabled = true; }
      else if (k === 'checked') { el.checked = v; }
      else if (k === 'value') el.value = v || '';
      else if (k === 'placeholder') el.placeholder = v;
      else if (k === 'type') el.type = v;
      else if (k === 'name') el.name = v;
      else if (k === 'accept') el.accept = v;
      else if (k === 'src') el.src = v;
      else if (k === 'alt') el.alt = v;
      else if (k === 'rows') el.rows = v;
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function render(content) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(buildLayout(content));
}

function buildLayout(mainContent) {
  const stats = {
    total: questions.length,
    bookmarked: questions.filter(q=>q.bookmarked).length,
    wrong: questions.filter(q=>q.wrong).length,
  };
  const nav = [
    {id:'quiz', icon:'▶', label:'문제 풀기'},
    {id:'list', icon:'⊞', label:'문제 목록'},
    {id:'register', icon:'＋', label:'문제 등록'},
  ];

  // Mobile hamburger
  const overlay = h('div', {class:'sidebar-overlay'});
  const hamburger = h('div', {class:'hamburger'}, '☰');
  const toggleSidebar = () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  };
  hamburger.addEventListener('click', toggleSidebar);
  overlay.addEventListener('click', toggleSidebar);

  const sidebar = h('div', {class:'sidebar'},
    h('div', {class:'sidebar-logo'}, 'Path', h('span', {}, 'Bank')),
    h('div', {class:'sidebar-sec'}, '메뉴'),
    ...nav.map(n => {
      const el = h('div', {class:'nav-item' + (page===n.id?' active':'')}, n.icon + ' ' + n.label);
      el.addEventListener('click', () => {
        // close sidebar on mobile
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
        goTo(n.id);
      });
      return el;
    }),
    h('hr', {class:'sidebar-divider'}),
    h('div', {class:'sidebar-stats'},
      h('div', {class:'stat-row'}, h('span',{},'전체'), h('span',{class:'stat-val'},String(stats.total))),
      h('div', {class:'stat-row'}, h('span',{},'북마크'), h('span',{class:'stat-val'},String(stats.bookmarked))),
      h('div', {class:'stat-row'}, h('span',{},'오답'), h('span',{class:'stat-val'},String(stats.wrong))),
    )
  );
  return h('div', {class:'app'}, hamburger, overlay, sidebar, h('div', {class:'main'}, mainContent));
}

async function goTo(p, data) {
  page = p;
  if (p === 'quiz') renderQuizMode(data);
  else if (p === 'list') renderList();
  else if (p === 'register') renderRegister(data);
}

// ── Load questions ──
async function loadQuestions() {
  const data = await sbSelect();
  if (data.length > 0) { questions = data; lsSave(data); }
  else { questions = lsLoad(); }
}

// ── Quiz ──
let quizPool = [], quizIdx = 0, quizSelected = null, quizSubmitted = false, quizScore = {c:0,t:0};

function renderQuizMode() {
  const cats = [...new Set(questions.map(q=>q.category).filter(Boolean))];
  const modes = [
    {id:'all', icon:'⊞', label:'전체 랜덤', cnt: questions.length},
    {id:'rdemo', icon:'', label:'R demo', cnt: questions.filter(q=>q.section==='R demo').length},
    {id:'robbins', icon:'', label:'Robbins', cnt: questions.filter(q=>q.section==='Robbins').length},
    {id:'ksp', icon:'', label:'KSP', cnt: questions.filter(q=>q.section==='KSP').length},
    {id:'bookmarked', icon:'★', label:'북마크 모음', cnt: questions.filter(q=>q.bookmarked).length},
    {id:'wrong', icon:'✕', label:'오답 노트', cnt: questions.filter(q=>q.wrong).length},
    ...cats.map(c => ({id:'cat:'+c, icon:'◈', label:c, cnt: questions.filter(q=>q.category===c).length})),
  ];
  const wrap = h('div', {class:'quiz-wrap'},
    h('div', {style:{fontWeight:700,fontSize:28,marginBottom:8}}, '문제 풀기'),
    h('div', {style:{color:'var(--text2)',fontSize:14,marginBottom:32}}, '모드를 선택하세요'),
    h('div', {style:{display:'flex',flexDirection:'column',gap:12,maxWidth:400}},
      ...modes.map(m => {
        const btn = h('button', {class:'mode-btn'},
          h('span',{}, m.icon + ' ' + m.label),
          h('span', {class:'mode-cnt'}, m.cnt + '문제')
        );
        btn.addEventListener('click', () => startQuiz(m.id));
        return btn;
      })
    )
  );
  render(wrap);
}

function startQuiz(mode) {
  let pool = questions;
  if (mode === 'bookmarked') pool = questions.filter(q=>q.bookmarked);
  else if (mode === 'wrong') pool = questions.filter(q=>q.wrong);
  else if (mode === 'rdemo') pool = questions.filter(q=>q.section==='R demo');
  else if (mode === 'robbins') pool = questions.filter(q=>q.section==='Robbins');
  else if (mode === 'ksp') pool = questions.filter(q=>q.section==='KSP');
  else if (mode.startsWith('cat:')) pool = questions.filter(q=>q.category===mode.slice(4));
  if (!pool.length) { toast('해당 조건의 문제가 없습니다', 'error'); return; }
  quizPool = [...pool].sort(()=>Math.random()-.5);
  quizIdx = 0; quizSelected = null; quizSubmitted = false; quizScore = {c:0,t:0};
  renderQuiz();
}

let saInput = '', saRevealed = false;

function renderQuizSA() {
  const q = quizPool[quizIdx];
  const parts = [
    h('div', {class:'progress-bar-wrap'},
      h('div', {class:'progress-bar'}, h('div', {class:'progress-fill', style:{width:((quizIdx+1)/quizPool.length*100)+'%'}})),
      h('span', {class:'progress-text'}, (quizIdx+1)+' / '+quizPool.length),
      h('span', {class:'progress-text', style:{color:'var(--blue)'}}, '✓ '+quizScore.c)
    ),
  ];

  // Section badge
  if (q.section==='R demo'&&q.case_id) parts.push(h('div',{style:{display:'flex',gap:8,marginBottom:12}},
    h('span',{class:'badge badge-rdemo',style:{fontFamily:'var(--mono)'}},q.case_id),
    h('span',{class:'badge badge-rdemo'},'R demo')
  ));
  if (q.section==='Robbins') parts.push(h('div',{style:{marginBottom:12}},
    h('span',{class:'badge',style:{background:'rgba(255,166,74,0.13)',color:'#ffa64a'}},'Robbins')
  ));
  if (q.section==='KSP') parts.push(h('div',{style:{marginBottom:12}},
    h('span',{class:'badge',style:{background:'rgba(74,255,180,0.13)',color:'#4affb4'}},'KSP')
  ));

  if (q.image_url) parts.push(h('div',{class:'quiz-img-wrap'},h('img',{src:q.image_url,alt:''})));
  parts.push(h('div',{class:'quiz-question'},q.question));

  if (!saRevealed) {
    // 답 입력 단계
    const inp = h('input',{class:'form-input',placeholder:'정답을 입력하세요…',value:saInput,style:{marginBottom:'12px'}});
    inp.addEventListener('input', e => saInput=e.target.value);
    inp.addEventListener('keydown', e => { if(e.key==='Enter') revealBtn.click(); });
    const revealBtn = h('button',{class:'btn btn-primary'},'정답 확인');
    revealBtn.addEventListener('click', () => { saRevealed=true; renderQuizSA(); });
    parts.push(inp, revealBtn);
  } else {
    // 정답 공개 단계
    const myAns = h('div',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'14px 18px',marginBottom:'12px',fontSize:14}},
      h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:4}},'내 답'),
      h('div',{style:{color:'var(--text)',fontWeight:500}},saInput||'(미입력)')
    );
    const corrAns = h('div',{style:{background:'var(--blue-bg)',border:'1px solid rgba(74,158,255,0.3)',borderRadius:'var(--radius)',padding:'14px 18px',marginBottom:'16px',fontSize:14}},
      h('div',{style:{fontSize:12,color:'var(--blue)',marginBottom:4}},'정답'),
      h('div',{style:{color:'var(--text)',fontWeight:600}},q.sa_answer||'(정답 미등록)')
    );

    if (q.explanation) {
      const expDiv = h('div',{class:'explanation',style:{marginBottom:'16px'}});
      q.explanation.split('\n').forEach(function(line) { expDiv.appendChild(line.trim()===''?h('div',{style:{height:'8px'}}):h('p',{},line)); });
      parts.push(myAns, corrAns, expDiv);
    } else {
      parts.push(myAns, corrAns);
    }

    // 정답/오답 버튼
    const oBtn = h('button',{class:'btn btn-danger',style:{marginRight:'8px'}},'✕ 오답');
    oBtn.addEventListener('click', async () => {
      quizScore.t++;
      questions = questions.map(x=>x.id===q.id?{...x,wrong:true}:x);
      quizPool = quizPool.map(x=>x.id===q.id?{...x,wrong:true}:x);
      lsSave(questions);
      await sbUpdate(q.id,{wrong:true});
      quizIdx++; saInput=''; saRevealed=false; renderQuiz();
    });
    const cBtn = h('button',{class:'btn btn-primary'},'✓ 정답');
    cBtn.addEventListener('click', () => {
      quizScore.t++; quizScore.c++;
      quizIdx++; saInput=''; saRevealed=false; renderQuiz();
    });
    parts.push(h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
      h('span',{style:{fontSize:14,color:'var(--text2)',marginRight:4}},'정답 여부:'),
      oBtn, cBtn
    ));
  }

  // Bookmark & stop
  const bmBtn = h('button',{class:'btn btn-ghost',style:{color:q.bookmarked?'var(--amber)':'',marginTop:'12px'}},
    q.bookmarked?'★ 북마크됨':'☆ 북마크');
  bmBtn.addEventListener('click', async () => {
    const nv=!q.bookmarked;
    questions=questions.map(x=>x.id===q.id?{...x,bookmarked:nv}:x);
    quizPool=quizPool.map(x=>x.id===q.id?{...x,bookmarked:nv}:x);
    lsSave(questions); await sbUpdate(q.id,{bookmarked:nv});
    toast(nv?'★ 북마크 추가':'북마크 해제'); renderQuizSA();
  });
  const stopBtn = h('button',{class:'btn btn-ghost',style:{marginTop:'12px'}},'그만하기');
  stopBtn.addEventListener('click', ()=>{ saInput=''; saRevealed=false; renderQuizMode(); });
  parts.push(h('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'8px'}}, bmBtn, stopBtn));

  render(h('div',{class:'quiz-wrap'},...parts));
}

function renderQuiz() {
  if (quizIdx >= quizPool.length) { renderDone(); return; }
  const q = quizPool[quizIdx];

  // 단답형
  if (q.q_type === 'sa') { renderQuizSA(); return; }

  const ans = Number(q.answer);

  const optEls = (q.options||[]).map((opt, i) => {
    let cls = 'quiz-option';
    if (quizSubmitted) {
      if (i === ans) cls += ' correct';
      else if (i === quizSelected) cls += ' wrong';
    } else if (i === quizSelected) cls += ' selected';

    const btn = h('button', {class: cls},
      h('span', {class:'quiz-opt-num'}, String(i+1)),
      h('span', {}, opt)
    );
    if (!quizSubmitted) {
      btn.addEventListener('click', () => { quizSelected = i; renderQuiz(); });
    }
    return btn;
  });

  const parts = [
    // Progress
    h('div', {class:'progress-bar-wrap'},
      h('div', {class:'progress-bar'}, h('div', {class:'progress-fill', style:{width: ((quizIdx+1)/quizPool.length*100)+'%'}})),
      h('span', {class:'progress-text'}, (quizIdx+1)+' / '+quizPool.length),
      h('span', {class:'progress-text', style:{color:'var(--blue)'}}, '✓ '+quizScore.c)
    ),
  ];

  // Section badge
  if (q.section === 'Robbins') {
    parts.push(h('div', {style:{marginBottom:12}},
      h('span', {class:'badge', style:{background:'rgba(255,166,74,0.13)',color:'#ffa64a'}}, 'Robbins')
    ));
  }
  if (q.section === 'KSP') {
    parts.push(h('div', {style:{marginBottom:12}},
      h('span', {class:'badge', style:{background:'rgba(74,255,180,0.13)',color:'#4affb4'}}, 'KSP')
    ));
  }
  if (q.section === 'R demo' && q.case_id) {
    parts.push(h('div', {style:{display:'flex',gap:8,marginBottom:12}},
      h('span', {class:'badge badge-rdemo', style:{fontFamily:'var(--mono)'}}, q.case_id),
      h('span', {class:'badge badge-rdemo'}, 'R demo')
    ));
  }

  // Image
  if (q.image_url) {
    parts.push(h('div', {class:'quiz-img-wrap'}, h('img', {src:q.image_url, alt:'문제 이미지'})));
  }

  parts.push(h('div', {class:'quiz-question'}, q.question));
  parts.push(h('div', {class:'quiz-options'}, ...optEls));

  // Result
  if (quizSubmitted) {
    const isCorrect = quizSelected === ans;
    const rc = h('div', {class:'result-card '+(isCorrect?'correct':'wrong')},
      h('div', {class:'result-header '+(isCorrect?'correct':'wrong')},
        isCorrect ? '✓ 정답입니다!' : '✕ 오답 — 정답: '+(ans+1)+'번'
      )
    );
    if (q.explanation) {
      const expDiv = h('div', {class:'explanation'});
      q.explanation.split('\n').forEach(function(line){expDiv.appendChild(line.trim()===''?h('div',{style:{height:'8px'}}):h('p',{},line));});
      rc.appendChild(expDiv);
    } else {
      rc.appendChild(h('div',{style:{fontSize:13,color:'var(--text3)',marginTop:8}},'등록된 해설이 없습니다'));
    }
    parts.push(rc);
  }

  // Actions
  const actions = h('div', {class:'quiz-actions'});
  if (!quizSubmitted) {
    const submitBtn = h('button', {class:'btn btn-primary', disabled: quizSelected===null}, '제출하기');
    submitBtn.addEventListener('click', async () => {
      const isCorrect = quizSelected === ans;
      quizSubmitted = true;
      quizScore.t++;
      if (isCorrect) quizScore.c++;
      else {
        const updated = {...q, wrong:true};
        questions = questions.map(x=>x.id===q.id?updated:x);
        quizPool = quizPool.map(x=>x.id===q.id?updated:x);
        lsSave(questions);
        await sbUpdate(q.id, {wrong:true});
      }
      renderQuiz();
    });
    actions.appendChild(submitBtn);
  } else {
    const nextBtn = h('button', {class:'btn btn-primary'}, quizIdx+1 < quizPool.length ? '다음 문제 →' : '결과 보기');
    nextBtn.addEventListener('click', () => { quizIdx++; quizSelected=null; quizSubmitted=false; renderQuiz(); });
    actions.appendChild(nextBtn);
  }
  const bmBtn = h('button', {class:'btn btn-ghost', style:{color: q.bookmarked?'var(--amber)':''}},
    q.bookmarked ? '★ 북마크됨' : '☆ 북마크');
  bmBtn.addEventListener('click', async () => {
    const newVal = !q.bookmarked;
    questions = questions.map(x=>x.id===q.id?{...x,bookmarked:newVal}:x);
    quizPool = quizPool.map(x=>x.id===q.id?{...x,bookmarked:newVal}:x);
    lsSave(questions);
    await sbUpdate(q.id, {bookmarked:newVal});
    toast(newVal?'★ 북마크 추가':'북마크 해제');
    renderQuiz();
  });
  const stopBtn = h('button', {class:'btn btn-ghost'}, '그만하기');
  stopBtn.addEventListener('click', () => renderQuizMode());
  actions.appendChild(bmBtn);
  actions.appendChild(stopBtn);
  parts.push(actions);

  render(h('div', {class:'quiz-wrap'}, ...parts));
}

function renderDone() {
  const pct = Math.round(quizScore.c/quizScore.t*100)||0;
  const icon = pct>=80?'🎉':pct>=50?'📚':'💪';
  const wrap = h('div', {class:'quiz-wrap'},
    h('div', {class:'done-wrap'},
      h('div', {class:'done-icon'}, icon),
      h('div', {style:{fontWeight:700,fontSize:28}}, '풀이 완료!'),
      h('div', {class:'done-score'}, quizScore.c+' / '+quizScore.t),
      h('div', {style:{color:'var(--text2)',marginBottom:32}}, '정답률 '+pct+'%'),
      h('div', {style:{display:'flex',gap:10,justifyContent:'center'}},
        (() => { const b=h('button',{class:'btn btn-primary'},'다시 풀기'); b.addEventListener('click',()=>renderQuizMode()); return b; })(),
        (() => { const b=h('button',{class:'btn btn-ghost'},'모드 선택'); b.addEventListener('click',()=>renderQuizMode()); return b; })()
      )
    )
  );
  render(wrap);
}

// ── List ──
let listFilter = 'all', listSearch = '';

function renderList() {
  const cats = [...new Set(questions.map(q=>q.category).filter(Boolean))];
  const filters = [['all','전체'],['rdemo','R demo'],['robbins','Robbins'],['ksp','KSP'],['bookmarked','★ 북마크'],['wrong','✕ 오답'],...cats.map(c=>[c,c])];

  const filtered = questions.filter(q => {
    if (listFilter==='bookmarked') return q.bookmarked;
    if (listFilter==='wrong') return q.wrong;
    if (listFilter==='rdemo') return q.section==='R demo';
    if (listFilter==='robbins') return q.section==='Robbins';
    if (listFilter==='ksp') return q.section==='KSP';
    if (listFilter!=='all') return q.category===listFilter;
    return true;
  }).filter(q => !listSearch || q.question.includes(listSearch)||(q.category||'').includes(listSearch)||(q.case_id||'').includes(listSearch));

  const searchInput = h('input', {class:'form-input', style:{width:'200px'}, placeholder:'검색…', value:listSearch});
  searchInput.addEventListener('input', e => { listSearch=e.target.value; renderList(); });

  const addBtn = h('button', {class:'btn btn-primary btn-sm'}, '＋ 등록');
  addBtn.addEventListener('click', () => goTo('register'));

  const header = h('div', {class:'page-header'},
    h('div', {},
      h('div', {class:'page-title'}, '문제 목록'),
      h('div', {class:'page-sub'}, '총 '+filtered.length+'개')
    ),
    h('div', {style:{display:'flex',gap:10,marginTop:4}}, searchInput, addBtn)
  );

  const filterBar = h('div', {class:'filter-bar'},
    ...filters.map(([val,label]) => {
      const btn = h('button', {class:'filter-chip'+(listFilter===val?' active':'')}, label);
      btn.addEventListener('click', () => { listFilter=val; renderList(); });
      return btn;
    })
  );

  const listEl = h('div', {class:'q-list'});
  if (!filtered.length) {
    listEl.appendChild(h('div',{class:'empty'}, h('div',{class:'empty-icon'},'📭'), h('p',{},'문제가 없습니다. 등록해보세요!')));
  } else {
    filtered.forEach(q => {
      const thumb = h('div', {class:'q-thumb'});
      if (q.image_url) thumb.appendChild(h('img',{src:q.image_url,alt:''}));
      else thumb.textContent = '🔬';

      const meta = h('div', {class:'q-meta'});
      if (q.section==='R demo') meta.appendChild(h('span',{class:'badge badge-rdemo'},'R demo'));
      if (q.section==='Robbins') meta.appendChild(h('span',{class:'badge',style:{background:'rgba(255,166,74,0.13)',color:'#ffa64a'}},'Robbins'));
      if (q.section==='KSP') meta.appendChild(h('span',{class:'badge',style:{background:'rgba(74,255,180,0.13)',color:'#4affb4'}},'KSP'));
      if (q.case_id) meta.appendChild(h('span',{class:'badge badge-rdemo',style:{fontFamily:'var(--mono)'}},q.case_id));
      if (q.category) meta.appendChild(h('span',{class:'badge badge-cat'},q.category));
      if (q.bookmarked) meta.appendChild(h('span',{class:'badge badge-bookmark'},'★ 북마크'));
      if (q.wrong) meta.appendChild(h('span',{class:'badge badge-wrong'},'✕ 오답'));
      (q.tags||[]).forEach(t => meta.appendChild(h('span',{class:'badge',style:{background:'var(--surface3)',color:'var(--text2)'}},t)));

      const editBtn = h('button',{class:'btn btn-ghost btn-sm'},'수정');
      editBtn.addEventListener('click', () => goTo('register', q));
      const delBtn = h('button',{class:'btn btn-danger btn-sm'},'삭제');
      delBtn.addEventListener('click', async () => {
        if (!confirm('삭제하시겠습니까?')) return;
        await sbDelete(q.id);
        questions = questions.filter(x=>x.id!==q.id);
        lsSave(questions);
        toast('삭제되었습니다');
        renderList();
      });

      listEl.appendChild(h('div',{class:'q-card'},
        thumb,
        h('div',{class:'q-info'}, h('div',{class:'q-text'},q.question), meta),
        h('div',{class:'q-actions'}, editBtn, delBtn)
      ));
    });
  }

  render(h('div',{}, header, filterBar, listEl));
}

// ── Register ──
let form = {};
const BLANK = {question:'',options:['','','','',''],answer:0,explanation:'',category:'',tags:[],image_url:'',case_id:'',section:'',q_type:'mcq',sa_answer:''};
const CATS = ['GI','Thorax','Breast','GY','Endocrine','GU','M.kidney','PB','Liver','H/N','Lymphoma','CNS','B/ST','Molecular','Skin','PPH','Cytology','Forensic','Frozen'];
let tagInput = '';

function renderRegister(editTarget) {
  if (!editTarget && Object.keys(form).length===0) form = {...BLANK, options:[...BLANK.options], tags:[]};
  if (editTarget) form = {...editTarget, options:[...editTarget.options], tags:[...(editTarget.tags||[])]};
  const isEdit = !!(form.id);

  // Image upload
  let fileInputEl;
  const uploadArea = h('div', {class:'upload-area'});
  const refreshUpload = () => {
    uploadArea.innerHTML = '';
    if (form.image_url) {
      uploadArea.appendChild(h('img',{src:form.image_url,alt:'preview'}));
    } else {
      uploadArea.appendChild(h('div',{class:'upload-icon'},'🔬'));
      uploadArea.appendChild(h('div',{class:'upload-text'},'클릭하여 업로드'));
      uploadArea.appendChild(h('div',{class:'upload-hint'},'또는 스크린샷 ', h('kbd',{},'Ctrl+V'), ' / 드래그앤드롭'));
    }
  };
  refreshUpload();
  uploadArea.addEventListener('click', () => fileInputEl && fileInputEl.click());
  uploadArea.addEventListener('dragover', e => e.preventDefault());
  uploadArea.addEventListener('drop', async e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) await handleImageFile(file, uploadArea, refreshUpload);
  });

  fileInputEl = h('input', {type:'file', accept:'image/*', style:{display:'none'}});
  fileInputEl.addEventListener('change', async e => {
    if (e.target.files[0]) await handleImageFile(e.target.files[0], uploadArea, refreshUpload);
  });

  const removeImgBtn = h('button',{class:'btn btn-ghost btn-sm',style:{marginTop:'8px',display:form.image_url?'':'none'}},'이미지 제거');
  removeImgBtn.addEventListener('click', () => { form.image_url=''; refreshUpload(); removeImgBtn.style.display='none'; });

  // Section chips
  const secWrap = h('div',{style:{display:'flex',gap:'7px'}});
  ['일반','R demo','Robbins','KSP'].forEach(sec => {
    const btn = h('button',{class:'sec-chip'+(form.section===sec?' active':'')},sec);
    btn.addEventListener('click', () => { form.section=sec; renderRegister(isEdit?form:null); });
    secWrap.appendChild(btn);
  });

  // Q type selector
  const qtypeWrap = h('div',{style:{display:'flex',gap:'7px'}});
  ['mcq','sa'].forEach(qt => {
    const label = qt==='mcq'?'5지선다':'단답형';
    const btn = h('button',{class:'sec-chip'+(form.q_type===qt||(!form.q_type&&qt==='mcq')?' active':'')},label);
    btn.addEventListener('click', () => { form.q_type=qt; renderRegister(isEdit?form:null); });
    qtypeWrap.appendChild(btn);
  });

  // SA answer (only for sa type)
  const saRow = form.q_type==='sa' ? h('div',{},
    h('div',{class:'form-label'},'단답 정답'),
    (() => { const inp=h('input',{class:'form-input',placeholder:'정답을 입력하세요',value:form.sa_answer||''}); inp.addEventListener('input',e=>form.sa_answer=e.target.value); return inp; })()
  ) : null;

  // Case ID (only for R demo)
  const caseRow = h('div',{style:{display:'flex',gap:'10px',alignItems:'flex-end'}},
    h('div',{style:{flex:1}}, h('div',{class:'form-label'},'섹션'), secWrap),
    ...(form.section==='R demo'?[h('div',{style:{flex:1}},
      h('div',{class:'form-label'},'케이스 번호'),
      (() => { const inp=h('input',{class:'form-input',placeholder:'R26-001',value:form.case_id||''}); inp.addEventListener('input',e=>form.case_id=e.target.value); return inp; })()
    )]:[] )
  );

  // Question
  const questionTA = h('textarea',{class:'form-textarea',placeholder:'문제를 입력하세요',rows:4});
  questionTA.value = form.question;
  questionTA.addEventListener('input', e => form.question=e.target.value);

  // Options
  const optionEls = form.options.map((opt,i) => {
    const numBadge = h('div',{class:'opt-num-badge'+(form.answer===i?' correct':'')},String(i+1));
    const radio = h('input',{type:'radio',name:'quiz-answer',class:'opt-radio'});
    radio.checked = form.answer===i;
    radio.addEventListener('change', () => {
      form.answer=i;
      document.querySelectorAll('.opt-num-badge').forEach((el,j)=>{
        el.className='opt-num-badge'+(form.answer===j?' correct':'');
      });
      document.querySelectorAll('.opt-radio').forEach((el,j)=>el.checked=(j===i));
    });
    const inp = h('input',{class:'form-input option-input',placeholder:'보기 '+(i+1),value:opt});
    inp.addEventListener('input', e => form.options[i]=e.target.value);
    return h('div',{class:'option-row'}, numBadge, radio, inp);
  });

  // Explanation
  const expTA = h('textarea',{class:'form-textarea',placeholder:'해설을 입력하세요'});
  expTA.value = form.explanation||'';
  expTA.addEventListener('input', e => form.explanation=e.target.value);

  // Category chips
  const catWrap = h('div',{style:{display:'flex',flexWrap:'wrap',gap:'7px'}});
  CATS.forEach(cat => {
    const btn = h('button',{class:'cat-chip'+(form.category===cat?' active':'')},cat);
    btn.addEventListener('click', () => {
      form.category = form.category===cat?'':cat;
      catWrap.querySelectorAll('.cat-chip').forEach((el,i)=>{
        el.className='cat-chip'+(CATS[i]===form.category?' active':'');
      });
    });
    catWrap.appendChild(btn);
  });

  // Tags
  const tagWrap = h('div',{class:'tag-wrap'});
  const tagInputEl = h('input',{class:'tag-input-bare',placeholder:'태그 입력…'});
  tagInputEl.value = tagInput;
  const refreshTags = () => {
    tagWrap.innerHTML='';
    (form.tags||[]).forEach((t,i) => {
      const del = h('span',{class:'tag-del'},'×');
      del.addEventListener('click', () => { form.tags.splice(i,1); refreshTags(); });
      tagWrap.appendChild(h('span',{class:'tag'},t,del));
    });
    tagWrap.appendChild(tagInputEl);
  };
  refreshTags();
  tagInputEl.addEventListener('keydown', e => {
    if ((e.key==='Enter'||e.key===',') && tagInputEl.value.trim()) {
      e.preventDefault();
      form.tags.push(tagInputEl.value.trim());
      tagInputEl.value='';
      tagInput='';
      refreshTags();
    }
  });
  tagWrap.addEventListener('click', () => tagInputEl.focus());

  // Save btn
  const saveBtn = h('button',{class:'btn btn-primary'},'✓ 저장하기');
  saveBtn.addEventListener('click', async () => {
    if (!form.question.trim()) { toast('문제를 입력해주세요','error'); return; }
    if ((!form.q_type||form.q_type==='mcq') && form.options.some(o=>!o.trim())) { toast('보기를 모두 입력해주세요','error'); return; }
    saveBtn.disabled=true; saveBtn.textContent='저장 중…';
    const payload = {
      question:form.question, options:form.options, answer:form.answer,
      explanation:form.explanation, category:form.category, tags:form.tags,
      image_url:form.image_url, bookmarked:form.bookmarked||false, wrong:form.wrong||false,
      case_id:form.case_id||'', section:form.section||'', q_type:form.q_type||'mcq', sa_answer:form.sa_answer||''
    };
    if (isEdit && form.id) {
      const {error} = await sbUpdate(form.id, payload);
      if (error) { toast('저장 실패: '+(error.message||error),'error'); saveBtn.disabled=false; saveBtn.textContent='✓ 저장하기'; return; }
      questions = questions.map(q=>q.id===form.id?{...form,...payload}:q);
    } else {
      const {data, error} = await sbInsert(payload);
      if (error) { toast('저장 실패: '+(error.message||JSON.stringify(error)),'error'); saveBtn.disabled=false; saveBtn.textContent='✓ 저장하기'; return; }
      const saved = Array.isArray(data)?data[0]:data;
      if (saved) questions.unshift(saved);
    }
    lsSave(questions);
    toast('저장되었습니다 ✓');
    form = {};
    goTo('list');
  });

  const cancelBtn = h('button',{class:'btn btn-ghost'},'취소');
  cancelBtn.addEventListener('click', () => { form={}; goTo('list'); });

  const header = h('div',{class:'page-header'},
    h('div',{},
      h('div',{class:'page-title'}, isEdit?'문제 수정':'문제 등록'),
      h('div',{class:'page-sub'}, isEdit?'기존 문제를 수정합니다':'새 문제를 등록합니다')
    ),
    h('div',{style:{display:'flex',gap:'10px',marginTop:'4px'}}, cancelBtn,
      (() => { const b=h('button',{class:'btn btn-primary btn-sm'},'저장하기'); b.addEventListener('click', ()=>saveBtn.click()); return b; })()
    )
  );

  const left = h('div',{class:'register-col'},
    h('div',{},
      h('div',{class:'form-label'},'이미지 (선택)'),
      uploadArea, fileInputEl, removeImgBtn
    ),
    h('div',{}, h('div',{class:'form-label'},'문제 유형'), qtypeWrap),
    h('div',{}, caseRow),
    h('div',{},
      h('div',{class:'form-label'},'문제'),
      questionTA
    )
  );

  const right = h('div',{class:'register-col'},
    ...((!form.q_type||form.q_type==='mcq')?[h('div',{},
      h('div',{class:'form-label'},'보기 (정답에 ○ 체크)'),
      h('div',{class:'options-list'}, ...optionEls)
    )]:[]),
    ...(saRow?[saRow]:[]),
    h('div',{},
      h('div',{class:'form-label'},'해설'),
      expTA
    ),
    h('div',{},
      h('div',{class:'form-label'},'카테고리'),
      catWrap
    ),
    h('div',{},
      h('div',{class:'form-label'},'태그 (Enter로 추가)'),
      tagWrap
    ),
    saveBtn
  );

  render(h('div',{}, header, h('div',{class:'register-grid'}, left, right)));

  // Paste handler
  const pasteHandler = async e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) await handleImageFile(file, uploadArea, refreshUpload);
        break;
      }
    }
  };
  window.addEventListener('paste', pasteHandler);
  // Store so we can remove later
  window._pasteHandler = pasteHandler;
}

async function handleImageFile(file, uploadArea, refreshUpload) {
  if (!file.type.startsWith('image/')) { toast('이미지 파일만 가능해요','error'); return; }
  // Show preview immediately
  const reader = new FileReader();
  reader.onload = e => { form.image_url = e.target.result; refreshUpload(); };
  reader.readAsDataURL(file);
  // Upload to Supabase
  const {url, error} = await sbUpload(file);
  if (error) { toast('이미지 업로드 실패: '+error,'error'); return; }
  if (url) { form.image_url = url; refreshUpload(); }
}

// ── Init ──
(async () => {
  await loadQuestions();
  renderQuizMode();
})();
</script>
</body>
</html>
